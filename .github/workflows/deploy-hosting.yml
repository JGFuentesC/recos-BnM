name: CI/CD Pipeline Recos-BnM

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-ingest-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recos-BnM
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias de Ingest
        run: |
          pip install -r ingest/requirements.txt

      - name: Correr pruebas de Ingest (pytest de Manuel)
        run: |
          pytest ingest/tests/

  frontend-build-deploy:
    runs-on: ubuntu-latest
    needs: backend-ingest-tests
    defaults:
      run:
        working-directory: recos-BnM
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Instalar dependencias del Proyecto
        run: |
          npm install --if-present

      - name: Construir aplicación
        run: |
          npm run build --if-present

      - name: Desplegar a Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_TOKEN }}'
          projectId: recos-bnm
          channelId: live